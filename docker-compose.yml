version: "3.9"

services:
  mongo:
    image: mongo:7
    container_name: sf_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - sentinel_net

  redis:
    image: redis:7-alpine
    container_name: sf_redis
    ports:
      - "6379:6379"
    networks:
      - sentinel_net

  minio:
    image: minio/minio:latest
    container_name: sf_minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console
    environment:
      MINIO_ROOT_USER: anand
      MINIO_ROOT_PASSWORD: test1234
    volumes:
      - minio_data:/data
    networks:
      - sentinel_net

  server:
    build: ./server
    container_name: sf_server
    ports:
      - "5000:5000"
    env_file: .env
    depends_on:
      - mongo
      - redis
      - minio
    volumes:
      - ./server:/app
      - /app/node_modules
    networks:
      - sentinel_net

  ai-worker:
    build: ./ai-worker
    container_name: sf_ai_worker
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - ./ai-worker:/app
    networks:
      - sentinel_net

volumes:
  mongo_data:
  minio_data:

networks:
  sentinel_net:
    driver: bridge